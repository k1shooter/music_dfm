seed: 7
device: cpu
num_workers: 0

data_root: data/cache/pop909_fsntg_v2

model:
  kind: posterior
  hidden_dim: 192
  num_layers: 2
  num_heads: 4
  dropout: 0.1

diffusion:
  path_type: mixture
  schedule:
    span_shift: 0.18
    span_relation_shift: 0.36
    placement_shift: 0.56
    note_shift: 0.74
    temperature: 0.12
  prior:
    active_on_prob: 0.18
    template_on_prob: 0.22
    e_ss_non_none_prob: 0.05
  graph_kernel:
    enabled: false

train:
  mode: dfm
  epochs: 20
  batch_size: 4
  learning_rate: 0.0002
  weight_decay: 0.0001
  beta_aux: 0.2
  beta_host: 0.1
  save_every: 1
  checkpoint_dir: artifacts/checkpoints_posterior
